name: sync-to-cnb
on:
    - push
    - delete

jobs:
    call-cnb-sync:
        uses: TDesignOteam/workflows/.github/workflows/reusable-cnb-sync.yml@d4ab7b6322b742ad666165394084cfef5dadcc50 # main
        with:
            github-repo: TDesignOteam/tdesign-api
            cnb-repo: tencent/tdesign/tdesign-api
        secrets:
            CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
